<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Avenor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  :root{
    --bg:#0b0d0c; --panel:#141713; --border:#262b25; --text:#f2f3ef;
    --muted:#9aa39a; --green:#7ea583; --green-bright:#a9d3ad; --green-deep:#2c3a2d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;
  }
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:19px;font-family:'Manrope',sans-serif;justify-content:center;margin-bottom:28px;}
  .login-card{
    width:100%; max-width:380px; background:var(--panel); border:1px solid var(--border);
    border-radius:20px; padding:38px 36px;
  }
  .login-card h1{font-family:'Manrope',sans-serif;font-size:22px;margin:0 0 6px;text-align:center;}
  .login-card p.sub{color:var(--muted);font-size:13.5px;text-align:center;margin:0 0 28px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:#cfd6cd;}
  .field input{
    width:100%;background:#0f120e;border:1px solid #2a2f26;border-radius:10px;
    padding:13px 16px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;
  }
  .field input:focus{outline:none;border-color:var(--green);}
  .btn-login{
    width:100%;padding:13px;border-radius:999px;font-weight:700;font-size:14.5px;
    background:linear-gradient(180deg,#33422f,#20291d);color:var(--green-bright);
    border:1px solid #3c4a37;cursor:pointer;margin-top:8px;transition:filter .2s;
  }
  .btn-login:hover{filter:brightness(1.15);}
  .btn-login:disabled{opacity:.6;cursor:not-allowed;}
  .error-msg{
    background:#2a1616;border:1px solid #4a2323;color:#e8a6a6;font-size:13px;
    padding:10px 14px;border-radius:10px;margin-bottom:18px;display:none;
  }
  .config-warning{
    background:#2a2416;border:1px solid #4a3f23;color:#e8d2a6;font-size:12.5px;
    padding:10px 14px;border-radius:10px;margin-bottom:18px;line-height:1.5;
  }
</style>
</head>
<body>

  <div>
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#e9ede7"/></svg>
      Avenor Admin
    </div>
    <div class="login-card">
      <h1>Masuk ke Dashboard</h1>
      <p class="sub">Kelola konten website Avenor</p>

      <div class="config-warning" id="config-warning" style="display:none;">
        ⚠ Firebase belum dikonfigurasi. Isi <code>firebase-config.js</code> dengan config project Anda terlebih dahulu.
      </div>
      <div class="error-msg" id="error-msg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@avenor.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">Masuk</button>
    </div>
  </div>

<script>
// Jika sudah login, langsung arahkan ke dashboard
try{
  auth.onAuthStateChanged(function(user){
    if(user){ window.location.href = 'admin-dashboard.html'; }
  });
}catch(err){
  document.getElementById('config-warning').style.display='block';
}

function showError(msg){
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin(){
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  document.getElementById('error-msg').style.display='none';

  if(!email || !password){
    showError('Isi email dan password terlebih dahulu.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Memproses...';

  auth.signInWithEmailAndPassword(email, password)
    .then(() => { window.location.href = 'admin-dashboard.html'; })
    .catch((err) => {
      btn.disabled = false;
      btn.textContent = 'Masuk';
      if(err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found'){
        showError('Email atau password salah.');
      } else if(err.code === 'auth/invalid-api-key' || err.code === 'auth/api-key-not-valid'){
        showError('Firebase config belum valid. Cek firebase-config.js.');
      } else {
        showError('Gagal login: ' + err.message);
      }
    });
}

document.getElementById('login-password').addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
